<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Punch-kun | Ichikawa Zoo</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e1e2f">
    <meta name="description" content="Punch-kun - The baby macaque who captured hearts worldwide with his beloved orangutan plushie after being abandoned by his mother.">
    <style>
        /* 前回と同じスタイル（省略） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #eeeeee;
            --text-secondary: #a0a0a0;
            --accent: #f39c12;
            --accent-hover: #e67e22;
            --card-bg: #0f3460;
            --border: #2c3e50;
            --shadow: rgba(0,0,0,0.4);
            --sponsor-bg: rgba(255,255,255,0.05);
        }
        body.light {
            --bg-primary: #fff5eb;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e2f;
            --text-secondary: #5a6e5a;
            --accent: #e67e22;
            --accent-hover: #d35400;
            --card-bg: #ffffff;
            --border: #f0e0c0;
            --shadow: rgba(0,0,0,0.08);
            --sponsor-bg: #fef5e8;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 1rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--accent);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        button {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover {
            background: var(--accent);
            color: #1e1e2f;
            border-color: var(--accent);
        }
        .lang-buttons {
            display: flex;
            gap: 0.3rem;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #1e1e2f;
            border-color: var(--accent);
        }
        .hero-image {
            margin-bottom: 1.5rem;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px var(--shadow);
            background: var(--card-bg);
        }
        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 16 / 9;
        }
        .hero-image .no-image {
            background: linear-gradient(135deg, var(--accent), #ffb347);
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 1rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 4px 12px var(--shadow);
            border: 1px solid var(--border);
        }
        .card h2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        .info-row {
            margin: 0.8rem 0;
        }
        .info-label {
            font-weight: 600;
            color: var(--accent);
        }
        .topic-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1rem 0;
        }
        .topic-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 1.2rem;
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--text-primary);
        }
        .topic-btn:hover {
            transform: translateX(5px);
            border-color: var(--accent);
            background: var(--card-bg);
        }
        .topic-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }
        .topic-content {
            flex: 1;
        }
        .topic-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }
        .topic-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .topic-arrow {
            font-size: 1.2rem;
            color: var(--accent);
        }
        .sponsor {
            background: var(--sponsor-bg);
            border: 1px dashed var(--border);
            border-radius: 1rem;
            padding: 0.8rem;
            margin: 1rem 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .sponsor-label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }
        .sponsor-placeholder {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stats {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }
        .stat-number {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        .install-btn {
            background: var(--accent);
            color: #1e1e2f;
            margin-top: 0.5rem;
        }
        @media (max-width: 480px) {
            .container {
                padding: 0.8rem;
            }
            .title {
                font-size: 1.4rem;
            }
            .topic-icon {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="title">🐒 Punch-kun</div>
            </div>
            <div class="controls">
                <div class="lang-buttons">
                    <button data-lang="en" class="lang-btn active">EN</button>
                    <button data-lang="ja" class="lang-btn">日本語</button>
                    <button data-lang="zh" class="lang-btn">中文</button>
                </div>
                <button id="themeToggle" aria-label="Toggle dark/light mode">🌓</button>
                <button id="clearCacheBtn" aria-label="Clear cache and reload">🗑️</button>
            </div>
        </div>

        <div class="hero-image" id="heroImage">
            <img src="punch-hero.jpg" alt="Punch-kun with his plushie" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'no-image\'><span>🐵🧸<br>Photo of Punch-kun<br>(Image to be added)</span></div>';">
        </div>

        <div class="sponsor" id="sponsor-top-main">
            <div class="sponsor-label">Sponsor</div>
            <div class="sponsor-placeholder">[ 広告スペース ]</div>
        </div>

        <div id="app-content"></div>

        <div class="sponsor" id="sponsor-bottom-main">
            <div class="sponsor-label">Sponsor</div>
            <div class="sponsor-placeholder">[ 広告スペース ]</div>
        </div>

        <footer>
            <p>© Ichikawa Zoo | <a href="https://www.city.ichikawa.lg.jp/zoo/" target="_blank">Official Website</a> | #HangInTherePunch</p>
            <button id="installButton" class="install-btn" style="display: none;">📲 Install App</button>
        </footer>
    </div>

    <script>
        // ==================== 多言語テキスト（前回と同じ） ====================
        const translations = {
            en: {

                locationAddr: "Ichikawa Zoo, 3-1-2 Yawata, Ichikawa-shi, Chiba 272-0021, Japan",
                access: "Access",

                tokyoInfo: "Tokyo Essentials",

                punchProfile: "About Punch-kun",

                birth: "Birth: July 26, 2025",
                species: "Species: Japanese Macaque (Nihonzaru)",
                plushie: "Companion: IKEA Djungelskog 'Ora-mama'",

                topic1Desc: "Born in summer heat, his mother showed no care. Keepers began artificial feeding the next day.",
                topic1Link: "https://www.city.ichikawa.lg.jp/zoo/guide/punch.html",
                topic2Title: "🧸 Ora-mama the Plushie",
                topic2Desc: "Why an IKEA orangutan? It's easy to grip and looks like a monkey. IKEA Japan donated many plushies!",
                topic2Link: "https://www.city.ichikawa.lg.jp/zoo/news/",
                topic3Title: "🐒 Growing Up in the Troop",
                topic3Desc: "Punch is learning monkey society—sometimes scolded, but showing resilience. He's making friends!",
                topic3Link: "https://www.city.ichikawa.lg.jp/zoo/enrichment/",
                topic4Title: "❤️ #HangInTherePunch",
                topic4Desc: "Global fans send support. The zoo posts daily updates on X (Twitter). Join the movement!",
                topic4Link: "https://x.com/ichikawa_zoo",
                moreInfo: "Learn More",
                officialSite: "Official Zoo Website",
                otherInfo: "Ichikawa Zoo is home to over 50 species. Punch is the star, but you'll also meet red pandas, penguins, and more.",
                ikeaNote: "📦 IKEA donated plush toys to support Punch!"
            },
            ja: {
                zooLocation: "動物園の場所",
                locationAddr: "市川動物園 〒272-0021 千葉県市川市八幡3-1-2",
                access: "アクセス",
                accessDetail: "東京駅からJR総武線快速で約15分、市川駅下車徒歩10分。",
                tokyoInfo: "東京情報",
                tokyoDesc: "都心から20～30分。パンチくんに会いに日帰り旅行にぴったり！",
                punchProfile: "パンチくんについて",
                profileText: "パンチくんは2025年7月26日生まれのニホンザルの赤ちゃん。母親に育児放棄され、飼育員が人工哺育で育てました。IKEAのオランウータンのぬいぐるみをおらままと呼び、いつも寄り添っています。#がんばれパンチくん で話題になり、多くの人が会いに訪れています。",
                stats: "基本データ",
                birth: "誕生日: 2025年7月26日",
                species: "種類: ニホンザル",
                plushie: "相棒: IKEAのぬいぐるみ 'おらまま'",
                topics: "パンチくんの物語",
                topic1Title: "🐣 育児放棄と救出",
                topic1Desc: "猛暑の夏に誕生。母親が育てず、翌日から飼育員が人工哺育を開始。",
                topic1Link: "https://www.city.ichikawa.lg.jp/zoo/guide/punch.html",
                topic2Title: "🧸 おらまま（ぬいぐるみ）",
                topic2Desc: "なぜIKEAのオランウータン？ 掴みやすく、サルに似ているから。IKEAジャパンがぬいぐるみを寄贈！",
                topic2Link: "https://www.city.ichikawa.lg.jp/zoo/news/",
                topic3Title: "🐒 サル社会での成長",
                topic3Desc: "時には叱られながらも、たくましく成長中。少しずつお友達も増えています。",
                topic3Link: "https://www.city.ichikawa.lg.jp/zoo/enrichment/",
                topic4Title: "❤️ #がんばれパンチくん",
                topic4Desc: "世界中から応援が届いています。動物園のXで毎日更新中！",
                topic4Link: "https://x.com/ichikawa_zoo",
                moreInfo: "詳しく見る",
                officialSite: "公式ホームページ",
                otherInfo: "市川動物園には50種以上の動物がいます。パンチくんがスターですが、レッサーパンダやペンギンにも会えます。",
                ikeaNote: "📦 IKEAジャパンがぬいぐるみを寄贈！"
            },
            zh: {
                zooLocation: "动物园位置",
                locationAddr: "市川动物园 〒272-0021 日本千叶县市川市八幡3-1-2",
                access: "交通信息",
                accessDetail: "从东京站乘坐JR总武线快速约15分钟，在市川站下车步行10分钟。",
                tokyoInfo: "东京简介",
                tokyoDesc: "距离东京市中心仅20-30分钟。一日游看Punch君的最佳选择！",
                punchProfile: "关于Punch君",
                profileText: "Punch君是2025年7月26日出生的日本猴宝宝。因被母亲弃养，饲养员开始人工喂养。他依偎着IKEA红毛猩猩玩偶，将其称为'Ora-mama'。#Punch加油 成为热门话题，许多人专程前来探望。",
                stats: "基本信息",
                birth: "生日: 2025年7月26日",
                species: "种类: 日本猴",
                plushie: "伙伴: IKEA玩偶 'Ora-mama'",
                topics: "Punch君的故事",
                topic1Title: "🐣 被弃养与救援",
                topic1Desc: "在盛夏出生。母亲未予照料，饲养员次日开始人工哺育。",
                topic1Link: "https://www.city.ichikawa.lg.jp/zoo/guide/punch.html",
                topic2Title: "🧸 Ora-mama玩偶",
                topic2Desc: "为什么选IKEA红毛猩猩？因为它容易抓握、长得像猴子。IKEA日本捐赠了许多玩偶！",
                topic2Link: "https://www.city.ichikawa.lg.jp/zoo/news/",
                topic3Title: "🐒 在猴群中成长",
                topic3Desc: "虽然有时会被责骂，但Punch君坚强地成长着，正在结交朋友。",
                topic3Link: "https://www.city.ichikawa.lg.jp/zoo/enrichment/",
                topic4Title: "❤️ #Punch加油",
                topic4Desc: "全球粉丝送来支持。动物园在X上每日更新！",
                topic4Link: "https://x.com/ichikawa_zoo",
                moreInfo: "了解更多",
                officialSite: "官方网站",
                otherInfo: "市川动物园拥有50多种动物。Punch君是明星，您还可以看到小熊猫、企鹅等。",
                ikeaNote: "📦 IKEA日本捐赠了玩偶支援Punch君！"
            }
        };

        let currentLang = 'en';
        let isDark = true;
        let deferredPrompt;

        // テーマ切替
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light');
                isDark = false;
            } else {
                document.body.classList.remove('light');
                isDark = true;
            }
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            setTheme(isDark ? 'light' : 'dark');
        }

        // 言語切替
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            renderContent();
        }

        // コンテンツ描画
        function renderContent() {
            const t = translations[currentLang];
            const container = document.getElementById('app-content');
            if (!container) return;

            container.innerHTML = `
                <div class="card">
                    <h2>📍 ${t.zooLocation}</h2>
                    <p>${t.locationAddr}</p>
                    <div class="info-row"><span class="info-label">🚆 ${t.access}</span><br>${t.accessDetail}</div>
                </div>
                <div class="card">
                    <h2>🗼 ${t.tokyoInfo}</h2>
                    <p>${t.tokyoDesc}</p>
                </div>
                <div class="card">
                    <h2>🦍 ${t.punchProfile}</h2>
                    <p>${t.profileText}</p>
                    <div class="stats">
                        <div class="stat-item"><div class="stat-number">🎂</div><div>${t.birth}</div></div>
                        <div class="stat-item"><div class="stat-number">🐵</div><div>${t.species}</div></div>
                        <div class="stat-item"><div class="stat-number">🧸</div><div>${t.plushie}</div></div>
                    </div>
                    <p style="font-size:0.85rem; margin-top:0.5rem;">✨ ${t.ikeaNote}</p>
                </div>
                <div class="card">
                    <h2>📖 ${t.topics}</h2>
                    <div class="sponsor" id="sponsor-top-detail">
                        <div class="sponsor-label">Sponsor</div>
                        <div class="sponsor-placeholder">[ 広告スペース ]</div>
                    </div>
                    <div class="topic-grid">
                        <a href="${t.topic1Link}" class="topic-btn" target="_blank" rel="noopener noreferrer">
                            <div class="topic-icon">🐣</div>
                            <div class="topic-content">
                                <div class="topic-title">${t.topic1Title}</div>
                                <div class="topic-desc">${t.topic1Desc}</div>
                            </div>
                            <div class="topic-arrow">→</div>
                        </a>
                        <a href="${t.topic2Link}" class="topic-btn" target="_blank" rel="noopener noreferrer">
                            <div class="topic-icon">🧸</div>
                            <div class="topic-content">
                                <div class="topic-title">${t.topic2Title}</div>
                                <div class="topic-desc">${t.topic2Desc}</div>
                            </div>
                            <div class="topic-arrow">→</div>
                        </a>
                        <a href="${t.topic3Link}" class="topic-btn" target="_blank" rel="noopener noreferrer">
                            <div class="topic-icon">🐒</div>
                            <div class="topic-content">
                                <div class="topic-title">${t.topic3Title}</div>
                                <div class="topic-desc">${t.topic3Desc}</div>
                            </div>
                            <div class="topic-arrow">→</div>
                        </a>
                        <a href="${t.topic4Link}" class="topic-btn" target="_blank" rel="noopener noreferrer">
                            <div class="topic-icon">❤️</div>
                            <div class="topic-content">
                                <div class="topic-title">${t.topic4Title}</div>
                                <div class="topic-desc">${t.topic4Desc}</div>
                            </div>
                            <div class="topic-arrow">→</div>
                        </a>
                    </div>
                    <div class="sponsor" id="sponsor-bottom-detail">
                        <div class="sponsor-label">Sponsor</div>
                        <div class="sponsor-placeholder">[ 広告スペース ]</div>
                    </div>
                </div>
                <div class="card">
                    <h2>🌐 ${t.officialSite}</h2>
                    <p>${t.otherInfo}</p>
                    <p><a href="https://www.city.ichikawa.lg.jp/zoo/" target="_blank">https://www.city.ichikawa.lg.jp/zoo/</a></p>
                </div>
            `;
        }

        // キャッシュクリア機能
        async function clearCacheAndReload() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
            }
            localStorage.clear(); // 必要に応じてコメントアウト可
            window.location.reload(true);
        }

        // PWAインストールプロンプト
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installButton');
            if (installBtn) installBtn.style.display = 'block';
        });

        document.getElementById('installButton')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to the install prompt: ${outcome}`);
            deferredPrompt = null;
            document.getElementById('installButton').style.display = 'none';
        });

        // 初期化
        function init() {
            const savedTheme = localStorage.getItem('theme');
            setTheme(savedTheme === 'light' ? 'light' : 'dark');
            const savedLang = localStorage.getItem('lang');
            setLanguage(translations[savedLang] ? savedLang : 'en');

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('clearCacheBtn').addEventListener('click', clearCacheAndReload);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });
        }

        // Service Worker 登録（スコープ明示）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
                .then(reg => console.log('SW registered with scope:', reg.scope))
                .catch(err => console.log('SW registration failed:', err));
        }

        init();
    </script>
</body>
</html>
